// 初始化字母栏
function initAlpha() {
    const box = document.getElementById('alphaBox');
    box.innerHTML = '';
    const allAlpha = '#ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    for(let a of allAlpha) {
        const btn = document.createElement('button');
        btn.className = 'alphabet-btn';
        btn.textContent = a;
        btn.onclick = ()=>filterByAlpha(a);
        box.appendChild(btn);
    }
}

// 按首字母筛选
function filterByAlpha(alpha) {
    let arr;
    if(alpha === '#') arr = [...wordList];
    else arr = wordList.filter(item=>item.word[0].toUpperCase() === alpha);
    renderList(arr);
}

// 渲染单词列表 修复滚动逻辑，找不到卡片不再阻塞渲染
function renderList(arr) {
    const wrap = document.getElementById('wordContainer');
    wrap.innerHTML = '';
    arr.forEach((item, idx)=>{
        const card = document.createElement('div');
        card.className = 'word-card';
        card.dataset.index = wordList.indexOf(item);
        card.innerHTML = `
            <div class="word-title">${item.word}</div>
            <div class="phonetic">${item.phonetic}</div>
            <div class="item-title">释义</div>
            <div class="word-mean ${isHide ? 'hide-content' : ''}">${item.meaning}</div>
            <div class="item-title">搭配</div>
            <div class="word-collocation ${isHide ? 'hide-content' : ''}">${item.collocation}</div>
            <div class="item-title">影视原句</div>
            <div class="word-movie ${isHide ? 'hide-content' : ''}">${item.movie}</div>
            <div class="item-title">例句</div>
            <div class="word-sentence ${isHide ? 'hide-content' : ''}">${item.sentence}</div>
        `;
        wrap.appendChild(card);
    })
    // 仅当存在有效卡片时滚动
    const targetCard = document.querySelector(`.word-card[data-index="${currentShowIndex}"]`);
    if(targetCard) {
        targetCard.scrollIntoView({behavior:'smooth', block:'nearest'});
    }
}

// 修复隐藏切换：只修改当前卡片，全局CSS变量移出JS字符串避免报错
document.getElementById('toggleHide').onclick = function() {
    const card = document.querySelector(`.word-card[data-index="${currentShowIndex}"]`);
    if(!card) return alert("请先使用随机/查询加载单词");
    isHide = !isHide;
    const areas = card.querySelectorAll('.word-mean,.word-collocation,.word-movie,.word-sentence');
    areas.forEach(el=>{
        if(isHide) el.classList.add('hide-content');
        else el.classList.remove('hide-content');
    })
}

// 随机单词
document.getElementById('randomBtn').onclick = function() {
    const randIdx = Math.floor(Math.random() * wordList.length);
    currentShowIndex = randIdx;
    renderList([wordList[randIdx]]);
}

// 查询单词
document.getElementById('searchBtn').onclick = function() {
    const key = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!key) return alert("请输入单词");
    const res = wordList.filter(item=>item.word.toLowerCase().includes(key));
    if(res.length ===0) return alert("未找到匹配单词");
    currentShowIndex = wordList.indexOf(res[0]);
    renderList(res);
}
document.getElementById('searchInput').onkeydown = e=>{
    if(e.key === 'Enter') document.getElementById('searchBtn').click();
}

// 深色模式
document.getElementById('darkBtn').onclick = function() {
    document.body.classList.toggle('dark');
}

// 标签切换
document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick = function() {
        const target = this.dataset.tab;
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.page-box').forEach(p=>p.classList.remove('active'));
        document.getElementById(`page-${target}`).classList.add('active');
    }
})

// ====================== 默写打卡逻辑（修复CSS变量JS报错）=====================
const CLOCK_KEY = "wordClockData";
function getClockData() {
    const raw = localStorage.getItem(CLOCK_KEY);
    return raw ? JSON.parse(raw) : {
        todayDate: "",
        target: 10,
        done: [],
        totalDays: 0
    }
}
function saveClockData(data) {
    localStorage.setItem(CLOCK_KEY, JSON.stringify(data));
}
function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function refreshClockStat() {
    const data = getClockData();
    document.getElementById('targetNum').textContent = data.target;
    document.getElementById('doneNum').textContent = data.done.length;
    document.getElementById('totalClock').textContent = data.totalDays;
}
document.getElementById('genClockBtn').onclick = function() {
    const data = getClockData();
    const today = getTodayStr();
    const target = Number(document.getElementById('dayCountSelect').value);
    if(data.today !== today) {
        data.todayDate = today;
        data.target = target;
        data.done = [];
        data.totalDays +=1;
        saveClockData(data);
    }
    renderMemList();
}
function renderMemList() {
    const data = getClockData();
    const wrap = document.getElementById('memList');
    wrap.innerHTML = '';
    const copyWords = [...wordList];
    copyWords.sort(()=>Math.random()-0.5);
    const todayWords = copyWords.slice(0, data.target);
    todayWords.forEach((item, idx)=>{
        const div = document.createElement('div');
        div.className = 'mem-item';
        const isFinish = data.done.includes(item.word);
        div.innerHTML = `
            <div class="mem-word">${idx+1}. ${item.phonetic}</div>
            <input class="mem-input" data-word="${item.word}" placeholder="默写英文单词" ${isFinish ? 'disabled value="'+item.word+'"':''}>
            <div class="ans-box"></div>
        `;
        const input = div.querySelector('.mem-input');
        const ansBox = div.querySelector('.ans-box');
        if(isFinish) ansBox.className = 'answer-right', ansBox.textContent = `✅ 正确：${item.word} ${item.meaning}`;
        input.onblur = function() {
            const userAns = this.value.trim().toLowerCase();
            const real = this.dataset.word.toLowerCase();
            if(userAns === real) {
                ansBox.className = 'answer-right';
                ansBox.textContent = `✅ 正确：${this.dataset.word} ${item.meaning}`;
                if(!data.done.includes(this.dataset.word)) {
                    data.done.push(this.dataset.word);
                    saveClockData(data);
                    refreshClockStat();
                }
            } else {
                ansBox.className = 'answer-wrong';
                ansBox.textContent = `❌ 错误，标准答案：${this.dataset.word}`;
            }
        }
        wrap.appendChild(div);
    })
}
document.getElementById('resetTodayBtn').onclick = function() {
    const data = getClockData();
    data.done = [];
    saveClockData(data);
    renderMemList();
    refreshClockStat();
}
document.getElementById('clearAllBtn').onclick = function() {
    if(confirm("确认清空所有打卡记录，无法恢复？")) {
        localStorage.removeItem(CLOCK_KEY);
        refreshClockStat();
        document.getElementById('memList').innerHTML = "";
    }
}

// 页面加载初始化
window.onload = function() {
    initAlpha();
    renderList(wordList);
    refreshClockStat();
}
</script>
